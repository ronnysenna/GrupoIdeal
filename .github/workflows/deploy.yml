name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
    
    - name: Deploy to Hostinger via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USERNAME }}
        key: ${{ secrets.HOSTINGER_SSH_KEY }}
        port: ${{ secrets.HOSTINGER_PORT }}
        script: |
          cd ${{ secrets.HOSTINGER_PATH }}
          
          # Clone/Pull do repositório
          if [ ! -d "GrupoIdeal" ]; then
            git clone https://github.com/ronnysenna/GrupoIdeal.git
          fi
          
          cd GrupoIdeal
          git fetch origin
          git reset --hard origin/main
          git pull origin main
          
          # Instalar dependências Composer
          cd cidades/palmacia/forms && composer install --no-dev --optimize-autoloader || echo "Composer failed for palmacia"
          cd ../../pacoti/forms && composer install --no-dev --optimize-autoloader || echo "Composer failed for pacoti"
          cd ../../ibicuitinga/forms && composer install --no-dev --optimize-autoloader || echo "Composer failed for ibicuitinga"
          cd ../../teralink/forms && composer install --no-dev --optimize-autoloader || echo "Composer failed for teralink"
          
          # Criar .env se não existir (usando exemplo)
          cd /home/${{ secrets.HOSTINGER_USERNAME }}/public_html/GrupoIdeal
          for dir in cidades/palmacia/forms cidades/pacoti/forms cidades/ibicuitinga/forms cidades/teralink/forms; do
            if [ ! -f "$dir/.env" ]; then
              echo "Criando .env em $dir"
              cp "$dir/.env.example" "$dir/.env" 2>/dev/null || echo "Aviso: .env.example não encontrado em $dir"
            fi
          done
          
          # Ajustar permissões
          chmod -R 755 .
          find . -name ".env" -exec chmod 600 {} \;
          
          echo "✅ Deploy concluído com sucesso!"
    
    - name: Notification
      if: always()
      run: |
        if [ ${{ job.status }} == 'success' ]; then
          echo "✅ Deploy executado com sucesso!"
        else
          echo "❌ Deploy falhou. Verifique os logs."
        fi
